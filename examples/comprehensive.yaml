---
defaults:
  project: "TEST"
  reporter: "tech-lead-account-id"
  assignee: "delivery-engineer-account-id"
  priority: "High"
  labels:
    - "automation"
    - "jirabatch"
  components:
    - "Platform"
  versions:
    - "2026.1"
  fixVersions:
    - "2026.2"
  environment: "Production"
  duedate: "2026-12-31"
  timetracking:
    originalEstimate: "3d"
    remainingEstimate: "3d"
  security: "Internal"
  customFields:
    customfield_10100: "Platform Team"
    customfield_10200: "Sprint 42"

# IMPORTANT:
# - This file creates 2 epics, then 5 issues linked to those epics, each with 2 subtasks.
# - Replace EPIC-PLATFORM-KEY and EPIC-SECURITY-KEY with real epic keys after creating epics.
issues:
  - issuetype: "Epic"
    summary: "Epic 1: Platform hardening"
    description: "Parent epic for platform hardening issues."
    labels:
      - "platform"
      - "hardening"

  - issuetype: "Epic"
    summary: "Epic 2: Security compliance"
    description: "Parent epic for security compliance issues."
    labels:
      - "security"
      - "compliance"

  - issuetype: "Task"
    summary: "Epic 1 - Issue 1: Rotate shared credentials"
    description: "Rotate shared credentials used by platform services."
    epic: "EPIC-PLATFORM-KEY"
    labels:
      - "platform"
      - "credentials"
    subtasks:
      - issuetype: "Sub-task"
        summary: "Task 1: Identify all shared credentials"
        description: "Inventory all shared credentials in use."
      - issuetype: "Sub-task"
        summary: "Task 2: Rotate and validate credentials"
        description: "Rotate credentials and validate all service integrations."

  - issuetype: "Task"
    summary: "Epic 1 - Issue 2: Enforce MFA for privileged users"
    description: "Require MFA for all privileged operational users."
    epic: "EPIC-PLATFORM-KEY"
    labels:
      - "platform"
      - "mfa"
    subtasks:
      - issuetype: "Sub-task"
        summary: "Task 1: Audit privileged accounts"
        description: "List all privileged users and current MFA status."
      - issuetype: "Sub-task"
        summary: "Task 2: Enable MFA and test fallback"
        description: "Enable MFA and test account recovery and fallback process."

  - issuetype: "Task"
    summary: "Epic 2 - Issue 1: Patch vulnerable base images"
    description: "Patch and rebuild container base images to remove vulnerabilities."
    epic: "EPIC-SECURITY-KEY"
    labels:
      - "security"
      - "containers"
    subtasks:
      - issuetype: "Sub-task"
        summary: "Task 1: Identify vulnerable image tags"
        description: "Identify all vulnerable tags used by deployment pipelines."
      - issuetype: "Sub-task"
        summary: "Task 2: Rebuild and publish patched images"
        description: "Rebuild images with fixes and publish updated tags."

  - issuetype: "Task"
    summary: "Epic 2 - Issue 2: Validate TLS expiry monitoring"
    description: "Ensure TLS certificate expiry alerts are accurate and timely."
    epic: "EPIC-SECURITY-KEY"
    labels:
      - "security"
      - "tls"
    subtasks:
      - issuetype: "Sub-task"
        summary: "Task 1: Simulate near-expiry certificates"
        description: "Create test certificates with short expiry for alert validation."
      - issuetype: "Sub-task"
        summary: "Task 2: Verify alert routing"
        description: "Verify alert routing to on-call and escalation channels."

  - issuetype: "Task"
    summary: "Epic 2 - Issue 3: Harden Jira API token lifecycle"
    description: "Implement token rotation and usage audit for Jira automation."
    epic: "EPIC-SECURITY-KEY"
    labels:
      - "security"
      - "tokens"
    subtasks:
      - issuetype: "Sub-task"
        summary: "Task 1: Add token expiry policy"
        description: "Define and document token expiry policy for automation accounts."
      - issuetype: "Sub-task"
        summary: "Task 2: Implement rotation schedule"
        description: "Implement recurring token rotation with audit trail."
